name: Build and test
on:
  push:
    paths:
      - '**.yml'
      - '**.toml'
      - '**.ini'
      - '**.py'
      - '**.json'
      - '**.csv'
      - '**.pkl'
  pull_request:
    paths:
      - '**.yml'
      - '**.toml'
      - '**.ini'
      - '**.py'
      - '**.json'
      - '**.csv'
      - '**.pkl'
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Miniconda using Python ${{ matrix.python-version }}
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          auto-update-conda: true
          activate-environment: ogzaf-dev
          environment-file: environment.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false

      - name: Build
        shell: bash -l {0}
        run: |
          pip install -e .
      - name: Test
        shell: bash -l {0}
        working-directory: ./
        run: |
          python -m pytest -m 'not local' --cov=./ --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && contains(github.repository, 'EAPD-DRB/OG-ZAF')
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
  pip-import-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Run import smoke tests outside checkout
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          cp "${{ github.workspace }}/tests/test_import_smoke.py" "$tmpdir/test_import_smoke.py"
          cd "$tmpdir"
          python -m pytest "$tmpdir/test_import_smoke.py"
