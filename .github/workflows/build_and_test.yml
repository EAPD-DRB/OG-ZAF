name: Build and test
on:
  push:
    paths:
      - '**.yml'
      - '**.toml'
      - '**.py'
      - '**.json'
      - '**.csv'
      - '**.pkl'
      - '**.pbz2'
      - '**.lock'
  pull_request:
    paths:
      - '**.yml'
      - '**.toml'
      - '**.py'
      - '**.json'
      - '**.csv'
      - '**.pkl'
      - '**.pbz2'
      - '**.lock'
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dependencies
        run: uv sync --extra dev
      - name: Test
        run: uv run python -m pytest -m "not local" --cov=./ --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && contains(github.repository, 'EAPD-DRB/OG-ZAF') && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
  pip-import-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Run import smoke tests outside checkout
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          cp "${{ github.workspace }}/tests/test_import_smoke.py" "$tmpdir/test_import_smoke.py"
          cd "$tmpdir"
          python -m pytest "$tmpdir/test_import_smoke.py"
